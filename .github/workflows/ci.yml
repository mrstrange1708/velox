name: Velox CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:
    name: Unit Tests — Execution Engine (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [C, CPP, Java, Node, Python, TS, CSharp]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for Docker Compose
        run: |
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install TypeScript (and esbuild)
        run: sudo npm install -g typescript esbuild

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Backend Unit Tests for ${{ matrix.language }}
        working-directory: backend
        run: |
          go mod tidy
          go test -v -race ./processSubmission -run TestProcessSubmission_${{ matrix.language }}$

  load-tests:
    name: Build Load Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Compile Load Test Binary
        working-directory: tests/load
        run: |
          go build -o load_test_binary .
          echo "✅ Load test binary compiled successfully"

      - name: Upload Load Test Binary
        uses: actions/upload-artifact@v4
        with:
          name: load-test-binary
          path: tests/load/load_test_binary
          retention-days: 7

  performance-tests:
    name: Build Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Compile Performance Test Binary
        working-directory: tests/performance
        run: |
          go build -o performance_test_binary .
          echo "✅ Performance test binary compiled successfully"

      - name: Upload Performance Test Binary
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-binary
          path: tests/performance/performance_test_binary
          retention-days: 7
