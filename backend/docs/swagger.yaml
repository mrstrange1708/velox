basePath: /
definitions:
  handler.GenerateKeyRequest:
    properties:
      expires_at:
        type: string
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  handler.GenerateKeyResponse:
    properties:
      created_at:
        type: string
      display_hint:
        type: string
      expires_at:
        type: string
      id:
        type: string
      key:
        type: string
    type: object
  handler.UpdateKeyRequest:
    properties:
      name:
        type: string
    type: object
  handler.errorResponse:
    properties:
      error:
        type: string
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handler.signupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handler.successResponse:
    properties:
      data: {}
      message:
        type: string
    type: object
  judge.SubmissionRequest:
    properties:
      language:
        description: e.g., "cpp", "python"
        type: string
      memory_limit_kb:
        type: integer
      source_code:
        type: string
      submission_id:
        type: string
      test_cases:
        description: Up to 20 cases
        items:
          $ref: '#/definitions/judge.TestCase'
        type: array
      time_limit_ms:
        type: integer
    type: object
  judge.SubmissionResponse:
    properties:
      compile_error:
        type: string
      overall_state:
        description: '"Accepted", "Wrong Answer", "Compile Error"'
        type: string
      results:
        items:
          $ref: '#/definitions/judge.TestCaseResult'
        type: array
      submission_id:
        type: string
    type: object
  judge.TestCase:
    properties:
      expected_output:
        type: string
      input:
        type: string
      test_case_id:
        type: integer
    type: object
  judge.TestCaseResult:
    properties:
      actual_output:
        type: string
      expected_output:
        type: string
      input:
        type: string
      memory_kb:
        type: integer
      status:
        description: '"Passed", "Wrong Answer", "Runtime Error"'
        type: string
      stderr:
        type: string
      test_case_id:
        type: integer
      time_ms:
        type: integer
    type: object
  model.APIKey:
    properties:
      created_at:
        type: string
      display_hint:
        type: string
      expires_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
      user_id:
        type: string
    type: object
  model.APIKeyStats:
    properties:
      api_key_id:
        type: string
      error_counts:
        additionalProperties:
          type: integer
        type: object
      peak_rpd:
        type: integer
      peak_rpm:
        type: integer
      success_rate:
        type: number
      total_requests:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the Velox API server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Velox API
  version: "1.0"
paths:
  /auth/api-keys:
    delete:
      description: Permanently revoke and delete an API key.
      parameters:
      - description: API Key UUID
        in: query
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Key deleted
        "400":
          description: Missing ID
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - Bearer: []
      summary: Delete API Key
      tags:
      - APIKeys
    get:
      description: Retrieve a list of all API keys created by the current user.
      produces:
      - application/json
      responses:
        "200":
          description: List of API keys
          schema:
            items:
              $ref: '#/definitions/model.APIKey'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - Bearer: []
      summary: List API Keys
      tags:
      - APIKeys
    patch:
      consumes:
      - application/json
      description: Rename an existing API key.
      parameters:
      - description: API Key UUID
        in: query
        name: id
        required: true
        type: string
      - description: Update Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateKeyRequest'
      responses:
        "204":
          description: Key updated
        "400":
          description: Missing ID or invalid JSON
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - Bearer: []
      summary: Update API Key Name
      tags:
      - APIKeys
    post:
      consumes:
      - application/json
      description: Create a new API key with specific scopes and optional expiration.
      parameters:
      - description: API Key Generation Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.GenerateKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: API key created
          schema:
            $ref: '#/definitions/handler.GenerateKeyResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - Bearer: []
      summary: Generate API Key
      tags:
      - APIKeys
  /auth/api-keys/stats:
    get:
      description: Retrieve performance metrics and usage peaks for a specific API
        key.
      parameters:
      - description: API Key ID
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: API Key Statistics
          schema:
            $ref: '#/definitions/model.APIKeyStats'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.errorResponse'
      security:
      - Bearer: []
      summary: Get API Key Stats
      tags:
      - APIKeys
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token.
      parameters:
      - description: Login Request
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/handler.successResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: User Login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate the session (stateless JWT logout).
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/handler.successResponse'
      summary: User Logout
      tags:
      - Auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user with name, email, and password.
      parameters:
      - description: Signup Request
        in: body
        name: signup
        required: true
        schema:
          $ref: '#/definitions/handler.signupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            $ref: '#/definitions/handler.successResponse'
        "400":
          description: Invalid request or validation error
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: User Signup
      tags:
      - Auth
  /dashboard:
    get:
      description: Fetch profile and activity data for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard data
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Dashboard Data
      tags:
      - Dashboard
  /status:
    get:
      description: Get the current status and results of a code submission.
      parameters:
      - description: Submission ID
        in: query
        name: submission_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Submission Response (omitted if pending)
          schema:
            $ref: '#/definitions/judge.SubmissionResponse'
        "400":
          description: Missing submission_id
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - Bearer: []
      summary: Check Submission Status
      tags:
      - Judge
  /submit:
    post:
      consumes:
      - application/json
      description: Submit source code for execution against test cases.
      parameters:
      - description: Submission Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/judge.SubmissionRequest'
      produces:
      - application/json
      responses:
        "202":
          description: submission_id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid JSON or limits too high
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Failed to queue submission
          schema:
            type: string
      security:
      - Bearer: []
      summary: Submit Code
      tags:
      - Judge
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and then your personal token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
